<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }

    #overlay {
      background: rgba(10, 10, 22, 0.95);
      border: 1px solid rgba(120, 100, 255, 0.25);
      border-radius: 14px;
      color: #e8eaf0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Draggable header */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: rgba(120, 100, 255, 0.06);
      border-bottom: 1px solid rgba(120, 100, 255, 0.1);
      -webkit-app-region: drag;
    }

    .hdr-left { display: flex; align-items: center; gap: 6px; }
    .hdr-logo { font-size: 12px; font-weight: 700; color: #a29bfe; }
    .hdr-pill {
      font-size: 8px; font-weight: 700; padding: 1px 7px; border-radius: 8px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .hdr-pill.live { background: rgba(0,180,140,0.2); color: #00b894; }
    .hdr-pill.wait { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.25); }
    .hdr-pill.busy { background: rgba(255,200,50,0.2); color: #feca57; animation: pulse 0.6s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .hdr-hint { font-size: 8px; color: rgba(255,255,255,0.15); -webkit-app-region: no-drag; }

    /* Big action */
    .action {
      padding: 10px 14px 8px;
      text-align: center;
      border-bottom: 1px solid rgba(120,100,255,0.08);
    }
    .action-label { font-size: 8px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.2); }
    .action-text { font-size: 28px; font-weight: 900; margin: 2px 0; }
    .action-text.fold { color: #ff6b6b; }
    .action-text.check { color: #74b9ff; }
    .action-text.call { color: #feca57; }
    .action-text.bet, .action-text.raise { color: #00b894; }
    .action-text.wait { color: rgba(255,255,255,0.15); font-size: 13px; font-weight: 500; }

    .action-info {
      font-size: 9px; color: rgba(255,255,255,0.3);
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
    }
    .action-info strong { color: rgba(255,255,255,0.55); }

    /* Situation line */
    .situ {
      padding: 6px 14px;
      font-size: 11px;
      line-height: 1.5;
      color: rgba(255,255,255,0.5);
      border-bottom: 1px solid rgba(120,100,255,0.06);
    }
    .situ .why { color: rgba(255,255,255,0.3); font-style: italic; }

    /* Table alert */
    .talert {
      padding: 4px 14px;
      background: rgba(155,89,182,0.1);
      font-size: 8px;
      color: #bb8fce;
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Chat */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .chat::-webkit-scrollbar { width: 3px; }
    .chat::-webkit-scrollbar-thumb { background: rgba(120,100,255,0.15); border-radius: 2px; }

    .m { margin-bottom: 8px; max-width: 92%; }
    .m.u { margin-left: auto; }
    .m .who { font-size: 7px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.2); margin-bottom: 1px; font-weight: 700; }
    .m .b {
      padding: 7px 11px; border-radius: 11px;
      font-size: 12px; line-height: 1.5; white-space: pre-wrap;
    }
    .m.u .b { background: rgba(120,100,255,0.15); border: 1px solid rgba(120,100,255,0.2); border-bottom-right-radius: 3px; }
    .m.a .b { background: rgba(0,180,140,0.08); border: 1px solid rgba(0,180,140,0.1); border-bottom-left-radius: 3px; }
    .m.s .b { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); color: rgba(255,255,255,0.35); font-size: 10px; text-align: center; }

    .typing { font-size: 10px; color: rgba(255,255,255,0.2); font-style: italic; padding: 4px 0; }

    /* Input */
    .inp {
      padding: 8px 12px;
      border-top: 1px solid rgba(120,100,255,0.1);
      background: rgba(120,100,255,0.03);
      display: flex; gap: 6px;
    }
    .inp input {
      flex: 1; padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(120,100,255,0.15);
      border-radius: 18px; color: #e8eaf0; font-size: 12px; outline: none;
    }
    .inp input:focus { border-color: rgba(120,100,255,0.4); }
    .inp input::placeholder { color: rgba(255,255,255,0.15); }
    .inp button {
      padding: 0 12px; background: rgba(120,100,255,0.7); border: none;
      border-radius: 18px; color: white; font-weight: 700; font-size: 12px; cursor: pointer;
    }
    .inp button:hover { background: rgba(120,100,255,0.9); }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="hdr">
      <div class="hdr-left">
        <span class="hdr-logo">&#9824; Coach</span>
        <span class="hdr-pill wait" id="pill">Waiting</span>
      </div>
      <span class="hdr-hint" id="ts">Cmd+\ hide</span>
    </div>

    <div class="action" id="actionBox">
      <div class="action-label">You Should</div>
      <div class="action-text wait" id="actionText">Waiting for capture...</div>
      <div class="action-info" id="actionInfo"></div>
    </div>

    <div class="situ" id="situBox" style="display:none;"></div>
    <div class="talert" id="tableAlert" style="display:none;"></div>

    <div class="chat" id="chat"></div>

    <div class="inp">
      <input id="ci" placeholder="Ask about this hand..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">&#9654;</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    let msgs = [];

    function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }

    function acls(a) {
      if (!a) return 'wait';
      const u = a.toUpperCase();
      if (u.includes('FOLD')) return 'fold';
      if (u.includes('CHECK')) return 'check';
      if (u.includes('CALL')) return 'call';
      if (u.includes('RAISE')) return 'raise';
      if (u.includes('BET')) return 'bet';
      return 'wait';
    }

    function addMsg(role, text) { msgs.push({ role, text }); renderChat(); }

    function renderChat() {
      const c = document.getElementById('chat');
      c.innerHTML = msgs.map(m => {
        if (m.role === 's') return `<div class="m s"><div class="b">${esc(m.text)}</div></div>`;
        const cls = m.role === 'u' ? 'u' : 'a';
        const who = m.role === 'u' ? 'You' : 'Coach';
        return `<div class="m ${cls}"><div class="who">${who}</div><div class="b">${esc(m.text)}</div></div>`;
      }).join('');
      c.scrollTop = c.scrollHeight;
    }

    ipcRenderer.on('overlay-update', (e, d) => {
      document.getElementById('pill').className = 'hdr-pill live';
      document.getElementById('pill').textContent = 'Live';
      document.getElementById('ts').textContent = d._timestamp || '';

      const at = document.getElementById('actionText');
      at.className = 'action-text ' + acls(d.action);
      at.textContent = d.action || 'N/A';

      // Info line: hand | board | pot | street
      const parts = [];
      if (d.hero_cards) parts.push(`Hand: <strong>${esc(d.hero_cards)}</strong>`);
      if (d.board) parts.push(`Board: <strong>${esc(d.board)}</strong>`);
      if (d.pot_size) parts.push(`Pot: <strong>${esc(d.pot_size)}</strong>`);
      if (d.street) parts.push(`<strong>${esc(d.street)}</strong>`);
      document.getElementById('actionInfo').innerHTML = parts.join(' &middot; ');

      // Situation + why
      const sb = document.getElementById('situBox');
      if (d.situation && d.action !== 'WAIT') {
        sb.style.display = '';
        sb.innerHTML = esc(d.situation) + (d.why ? `<br><span class="why">${esc(d.why)}</span>` : '');
      } else { sb.style.display = 'none'; }

      // New street / new hand indicator
      if (d._boardChanged) {
        addMsg('s', `--- ${d.street || 'NEW HAND'} --- ${d.board || 'cards dealt'}`);
      }

      // Table change
      const ta = document.getElementById('tableAlert');
      if (d._tableChange) {
        ta.style.display = '';
        if (d._tableChange.type === 'new_table') { ta.textContent = 'New table detected'; addMsg('s', 'New table - tracking players'); }
        else {
          const p = [];
          if (d._tableChange.joined?.length) p.push('+' + d._tableChange.joined.join(', '));
          if (d._tableChange.left?.length) p.push('-' + d._tableChange.left.join(', '));
          ta.textContent = p.join(' | ');
        }
      } else { ta.style.display = 'none'; }
    });

    ipcRenderer.on('overlay-status', (e, s) => {
      if (s === 'analyzing') {
        document.getElementById('pill').className = 'hdr-pill busy';
        document.getElementById('pill').textContent = 'Reading...';
      }
    });

    ipcRenderer.on('chat-response', (e, text) => {
      document.querySelector('.typing')?.remove();
      addMsg('a', text);
    });

    function send() {
      const i = document.getElementById('ci');
      const t = i.value.trim();
      if (!t) return;
      i.value = '';
      addMsg('u', t);
      const c = document.getElementById('chat');
      const ty = document.createElement('div');
      ty.className = 'typing';
      ty.textContent = 'Thinking...';
      c.appendChild(ty);
      c.scrollTop = c.scrollHeight;
      ipcRenderer.send('overlay-chat', t);
    }
  </script>
</body>
</html>
