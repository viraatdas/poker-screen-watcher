<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      -webkit-app-region: no-drag;
    }

    #overlay {
      background: rgba(8, 8, 24, 0.92);
      border: 2px solid rgba(100, 200, 255, 0.35);
      border-radius: 14px;
      padding: 0;
      color: #e0e8f0;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(100, 200, 255, 0.08);
      overflow: hidden;
    }

    /* Top bar with status */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: rgba(100, 200, 255, 0.06);
      border-bottom: 1px solid rgba(100, 200, 255, 0.12);
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(100, 200, 255, 0.6);
    }

    .status-pill {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-pill.ready { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
    .status-pill.analyzing {
      background: rgba(243, 156, 18, 0.2);
      color: #f39c12;
      animation: blink 0.8s ease-in-out infinite;
    }
    .status-pill.waiting { background: rgba(100, 200, 255, 0.1); color: rgba(100, 200, 255, 0.5); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .street-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      background: rgba(155, 89, 182, 0.2);
      color: #bb8fce;
    }

    /* The big action box */
    .action-box {
      padding: 14px 16px;
      text-align: center;
    }

    .action-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 4px;
    }

    .action-text {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .action-text.fold { color: #e74c3c; }
    .action-text.check { color: #3498db; }
    .action-text.call { color: #f39c12; }
    .action-text.bet, .action-text.raise { color: #2ecc71; }
    .action-text.waiting { color: rgba(100, 200, 255, 0.3); font-size: 16px; }
    .action-text.error { color: #e74c3c; font-size: 14px; }

    .confidence {
      display: inline-block;
      margin-top: 4px;
      font-size: 9px;
      font-weight: 600;
      padding: 1px 8px;
      border-radius: 8px;
      text-transform: uppercase;
    }

    .confidence.HIGH { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
    .confidence.MEDIUM { background: rgba(243, 156, 18, 0.15); color: #f39c12; }
    .confidence.LOW { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }

    /* Details section */
    .details {
      padding: 10px 16px 12px;
      border-top: 1px solid rgba(100, 200, 255, 0.08);
    }

    .situation-text {
      font-size: 12px;
      line-height: 1.5;
      color: #a8c8e8;
      margin-bottom: 6px;
    }

    .why-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      font-style: italic;
    }

    /* Player notes bar */
    .player-bar {
      padding: 8px 16px 10px;
      border-top: 1px solid rgba(100, 200, 255, 0.08);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .player-tag {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(100, 200, 255, 0.08);
      border: 1px solid rgba(100, 200, 255, 0.12);
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
    }

    .player-tag .player-type {
      color: #f39c12;
      font-weight: 600;
    }

    /* Table change banner */
    .table-change {
      padding: 6px 16px;
      background: rgba(155, 89, 182, 0.15);
      border-top: 1px solid rgba(155, 89, 182, 0.2);
      font-size: 10px;
      color: #bb8fce;
      text-align: center;
      font-weight: 600;
    }

    /* Game info row */
    .game-info {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 4px 16px 0;
    }

    .game-info-item {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
    }

    .game-info-item strong {
      color: rgba(255, 255, 255, 0.6);
    }

    /* Waiting state */
    .waiting-state {
      padding: 30px 20px;
      text-align: center;
    }

    .waiting-state .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .waiting-state .msg {
      font-size: 13px;
      color: rgba(100, 200, 255, 0.5);
      margin-bottom: 8px;
    }

    .waiting-state .shortcut {
      font-size: 11px;
      color: rgba(100, 200, 255, 0.3);
    }

    .waiting-state kbd {
      background: rgba(100, 200, 255, 0.1);
      border: 1px solid rgba(100, 200, 255, 0.2);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: inherit;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="content">
      <div class="waiting-state">
        <div class="icon">&#9824;</div>
        <div class="msg">Poker Advisor Ready</div>
        <div class="shortcut">
          <kbd>Cmd+Shift+P</kbd> capture &nbsp; <kbd>Cmd+\</kbd> toggle
        </div>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function getActionClass(action) {
      if (!action) return 'waiting';
      const a = action.toUpperCase();
      if (a.includes('FOLD')) return 'fold';
      if (a.includes('CHECK')) return 'check';
      if (a.includes('CALL')) return 'call';
      if (a.includes('RAISE')) return 'raise';
      if (a.includes('BET')) return 'bet';
      if (a.includes('ERROR') || a.includes('WAIT')) return 'waiting';
      return 'bet';
    }

    function renderAnalysis(data) {
      const content = document.getElementById('content');

      if (!data || data.action === 'WAITING' || data.action === 'ERROR') {
        content.innerHTML = `
          <div class="top-bar">
            <div class="top-bar-left">
              <span class="logo">Advisor</span>
              <span class="status-pill ready">Ready</span>
            </div>
          </div>
          <div class="action-box">
            <div class="action-label">Status</div>
            <div class="action-text waiting">${escapeHtml(data?.situation || 'No poker table detected')}</div>
          </div>
        `;
        return;
      }

      const actionClass = getActionClass(data.action);

      let html = `
        <div class="top-bar">
          <div class="top-bar-left">
            <span class="logo">Advisor</span>
            <span class="status-pill ready">Live</span>
          </div>
          ${data.street && data.street !== 'UNKNOWN' ? `<span class="street-badge">${escapeHtml(data.street)}</span>` : ''}
        </div>
      `;

      // Game info (cards, pot)
      if (data.hero_cards || data.pot_size) {
        html += '<div class="game-info">';
        if (data.hero_cards) html += `<span class="game-info-item">Hand: <strong>${escapeHtml(data.hero_cards)}</strong></span>`;
        if (data.board) html += `<span class="game-info-item">Board: <strong>${escapeHtml(data.board)}</strong></span>`;
        if (data.pot_size) html += `<span class="game-info-item">Pot: <strong>${escapeHtml(data.pot_size)}</strong></span>`;
        html += '</div>';
      }

      // Big action
      html += `
        <div class="action-box">
          <div class="action-label">You Should</div>
          <div class="action-text ${actionClass}">${escapeHtml(data.action)}</div>
          ${data.confidence ? `<span class="confidence ${data.confidence}">${data.confidence} confidence</span>` : ''}
        </div>
      `;

      // Situation + Why
      html += `
        <div class="details">
          <div class="situation-text">${escapeHtml(data.situation)}</div>
          ${data.why ? `<div class="why-text">${escapeHtml(data.why)}</div>` : ''}
        </div>
      `;

      // Table change alert
      if (data._tableChange && data._tableChange.type === 'new_table') {
        html += `<div class="table-change">NEW TABLE DETECTED</div>`;
      } else if (data._tableChange && data._tableChange.type === 'players_changed') {
        const parts = [];
        if (data._tableChange.joined?.length) parts.push(`+${data._tableChange.joined.join(', ')}`);
        if (data._tableChange.left?.length) parts.push(`-${data._tableChange.left.join(', ')}`);
        html += `<div class="table-change">Table changed: ${escapeHtml(parts.join(' | '))}</div>`;
      }

      // Player stats tags
      if (data._playerStats && Object.keys(data._playerStats).length > 0) {
        html += '<div class="player-bar">';
        for (const [name, stats] of Object.entries(data._playerStats)) {
          html += `<span class="player-tag">${escapeHtml(name)} <span class="player-type">${stats.type}</span> ${stats.vpip_pct}/${stats.pfr_pct}</span>`;
        }
        html += '</div>';
      }

      content.innerHTML = html;
    }

    ipcRenderer.on('overlay-update', (event, data) => {
      renderAnalysis(data);
    });

    ipcRenderer.on('overlay-status', (event, status) => {
      if (status === 'analyzing') {
        // Show analyzing state on the top bar without clearing the content
        const pill = document.querySelector('.status-pill');
        if (pill) {
          pill.className = 'status-pill analyzing';
          pill.textContent = 'Analyzing...';
        }
      }
    });
  </script>
</body>
</html>
